# MCP 工具接口文档
# 飞书 Markdown MCP 服务工具定义
# 版本: 1.0.0

openapi: 3.0.3
info:
  title: 飞书 Markdown MCP 工具
  description: |
    飞书 Markdown MCP 服务提供的所有工具接口定义。
    这些工具通过 MCP 协议暴露，供 AI 助手调用。
  version: 1.0.0

tools:
  # ============================================
  # OAuth 认证工具
  # ============================================

  feishu_auth_url:
    name: feishu_auth_url
    title: 获取飞书授权 URL
    description: |
      生成飞书 OAuth 2.0 授权 URL，用于用户授权。
      用户访问此 URL 后，会被重定向到飞书登录页面进行授权。
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
    inputSchema:
      type: object
      properties:
        appId:
          type: string
          description: 飞书应用 ID。如果不提供，将使用默认配置的应用。
        redirectUri:
          type: string
          description: OAuth 回调 URL。如果不提供，将使用默认配置。
    outputSchema:
      type: object
      required:
        - authUrl
        - state
      properties:
        authUrl:
          type: string
          description: 飞书授权 URL
        state:
          type: string
          description: 用于验证回调的状态参数
        appId:
          type: string
          description: 使用的应用 ID

  feishu_auth_callback:
    name: feishu_auth_callback
    title: 处理飞书授权回调
    description: |
      处理飞书 OAuth 2.0 授权回调，交换授权码获取访问令牌。
      成功后会存储令牌并返回用户信息。
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: true
    inputSchema:
      type: object
      required:
        - code
        - state
      properties:
        code:
          type: string
          description: 飞书返回的授权码
        state:
          type: string
          description: 状态参数，用于验证请求
        appId:
          type: string
          description: 飞书应用 ID
    outputSchema:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: 是否成功
        userInfo:
          type: object
          description: 用户信息
          properties:
            userId:
              type: string
            name:
              type: string
            email:
              type: string
            avatarUrl:
              type: string
        expiresAt:
          type: string
          format: date-time
          description: 令牌过期时间
        error:
          type: string
          description: 错误信息

  # ============================================
  # 文档操作工具
  # ============================================

  feishu_upload_markdown:
    name: feishu_upload_markdown
    title: 上传 Markdown 到飞书
    description: |
      将 Markdown 文档上传到飞书云空间或知识库。
      支持本地文件路径或直接传入内容。
      自动处理图片和附件上传。
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: true
    inputSchema:
      type: object
      properties:
        filePath:
          type: string
          description: Markdown 文件路径。与 content 二选一。
        content:
          type: string
          description: Markdown 内容。与 filePath 二选一。
        title:
          type: string
          description: 文档标题。如果不提供，将从文件名或内容中提取。
        workingDirectory:
          type: string
          description: 工作目录，用于解析相对路径。
        targetType:
          type: string
          enum: [drive, wiki]
          default: drive
          description: 目标类型：drive（云空间）或 wiki（知识库）
        targetId:
          type: string
          description: 目标 ID（文件夹 token 或知识库空间 ID）
        appId:
          type: string
          description: 飞书应用 ID
        uploadImages:
          type: boolean
          default: true
          description: 是否上传本地图片
        uploadAttachments:
          type: boolean
          default: true
          description: 是否上传本地附件
        removeFrontMatter:
          type: boolean
          default: true
          description: 是否移除 Front Matter
    outputSchema:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: 是否成功
        documentId:
          type: string
          description: 飞书文档 ID
        url:
          type: string
          description: 飞书文档 URL
        title:
          type: string
          description: 文档标题
        uploadedFiles:
          type: array
          description: 已上传的文件列表
          items:
            type: object
            properties:
              originalPath:
                type: string
              fileName:
                type: string
              fileKey:
                type: string
              isImage:
                type: boolean
        error:
          type: string
          description: 错误信息

  feishu_update_document:
    name: feishu_update_document
    title: 更新飞书文档
    description: |
      更新已存在的飞书文档内容。
      支持冲突检测，防止覆盖他人修改。
    annotations:
      readOnlyHint: false
      destructiveHint: true
      idempotentHint: false
      openWorldHint: true
    inputSchema:
      type: object
      required:
        - documentId
      properties:
        documentId:
          type: string
          description: 飞书文档 ID
        filePath:
          type: string
          description: Markdown 文件路径
        content:
          type: string
          description: Markdown 内容
        workingDirectory:
          type: string
          description: 工作目录
        appId:
          type: string
          description: 飞书应用 ID
        uploadImages:
          type: boolean
          default: true
        uploadAttachments:
          type: boolean
          default: true
        removeFrontMatter:
          type: boolean
          default: true
        force:
          type: boolean
          default: false
          description: 是否强制覆盖（忽略冲突检测）
    outputSchema:
      type: object
      required:
        - success
        - documentId
      properties:
        success:
          type: boolean
        documentId:
          type: string
        url:
          type: string
        conflictDetected:
          type: boolean
          description: 是否检测到冲突
        error:
          type: string

  feishu_batch_upload_markdown:
    name: feishu_batch_upload_markdown
    title: 批量上传 Markdown 到飞书
    description: |
      批量将多个 Markdown 文档上传到飞书。
      支持并发控制和错误隔离。
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: false
      openWorldHint: true
    inputSchema:
      type: object
      required:
        - documents
      properties:
        documents:
          type: array
          minItems: 1
          maxItems: 50
          description: 要上传的文档列表
          items:
            type: object
            properties:
              filePath:
                type: string
              content:
                type: string
              title:
                type: string
              targetType:
                type: string
                enum: [drive, wiki]
              targetId:
                type: string
        workingDirectory:
          type: string
        appId:
          type: string
        concurrency:
          type: integer
          minimum: 1
          maximum: 5
          default: 3
          description: 并发数量
        uploadImages:
          type: boolean
          default: true
        uploadAttachments:
          type: boolean
          default: true
        removeFrontMatter:
          type: boolean
          default: true
    outputSchema:
      type: object
      required:
        - total
        - succeeded
        - failed
        - results
      properties:
        total:
          type: integer
          description: 总文档数
        succeeded:
          type: integer
          description: 成功数量
        failed:
          type: integer
          description: 失败数量
        results:
          type: array
          description: 详细结果列表
          items:
            type: object
            properties:
              index:
                type: integer
              success:
                type: boolean
              documentId:
                type: string
              url:
                type: string
              title:
                type: string
              error:
                type: string

  # ============================================
  # 管理工具
  # ============================================

  feishu_list_folders:
    name: feishu_list_folders
    title: 列出飞书文件夹
    description: 列出飞书云空间中的文件夹。
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
    inputSchema:
      type: object
      properties:
        parentId:
          type: string
          description: 父文件夹 token。不提供则列出根目录。
        appId:
          type: string
    outputSchema:
      type: object
      required:
        - folders
        - total
      properties:
        folders:
          type: array
          items:
            type: object
            properties:
              token:
                type: string
              name:
                type: string
              parentToken:
                type: string
        total:
          type: integer

  feishu_list_wikis:
    name: feishu_list_wikis
    title: 列出飞书知识库
    description: 列出用户有权限访问的飞书知识库空间。
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
    inputSchema:
      type: object
      properties:
        appId:
          type: string
    outputSchema:
      type: object
      required:
        - wikis
        - total
      properties:
        wikis:
          type: array
          items:
            type: object
            properties:
              spaceId:
                type: string
              name:
                type: string
              description:
                type: string
        total:
          type: integer

  feishu_get_user_info:
    name: feishu_get_user_info
    title: 获取飞书用户信息
    description: 获取当前已授权用户的信息。
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: true
    inputSchema:
      type: object
      properties:
        appId:
          type: string
    outputSchema:
      type: object
      required:
        - userId
        - name
      properties:
        userId:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string

  feishu_list_apps:
    name: feishu_list_apps
    title: 列出飞书应用
    description: 列出所有已配置的飞书应用及其授权状态。
    annotations:
      readOnlyHint: true
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
    inputSchema:
      type: object
      properties: {}
    outputSchema:
      type: object
      required:
        - apps
        - total
      properties:
        apps:
          type: array
          items:
            type: object
            properties:
              appId:
                type: string
              isDefault:
                type: boolean
              hasToken:
                type: boolean
              userName:
                type: string
        total:
          type: integer
        defaultAppId:
          type: string

  feishu_set_default_app:
    name: feishu_set_default_app
    title: 设置默认飞书应用
    description: 设置默认使用的飞书应用。
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
      openWorldHint: false
    inputSchema:
      type: object
      required:
        - appId
      properties:
        appId:
          type: string
          description: 要设置为默认的应用 ID
    outputSchema:
      type: object
      required:
        - success
        - appId
      properties:
        success:
          type: boolean
        appId:
          type: string
        message:
          type: string

# ============================================
# 错误码说明
# ============================================
errorCodes:
  INVALID_PARAMS:
    code: -32602
    description: 无效的参数
    examples:
      - 缺少必需参数
      - 参数格式错误
      - filePath 和 content 都未提供

  INTERNAL_ERROR:
    code: -32603
    description: 内部错误
    examples:
      - 服务内部异常
      - 数据库连接失败

  AUTH_REQUIRED:
    code: -32001
    description: 需要授权
    examples:
      - 未找到有效的访问令牌
      - 令牌已过期

  PERMISSION_DENIED:
    code: -32002
    description: 权限不足
    examples:
      - 无权访问目标文件夹
      - 无权访问知识库

  RESOURCE_NOT_FOUND:
    code: -32003
    description: 资源不存在
    examples:
      - 文档不存在
      - 文件夹不存在

  CONFLICT:
    code: -32004
    description: 资源冲突
    examples:
      - 文档已被他人修改

  RATE_LIMITED:
    code: -32005
    description: 请求频率超限
    examples:
      - 超过飞书 API 调用限制
